[package]
name = "vm-attest"
version = "0.1.0"
edition = "2024"
license = "MPL-2.0"
build = "build/main.rs"

[features]
default = ["vsock"]
test-data = []
vsock = ["dep:vsock"]

[dependencies]
attest-data.git = "https://github.com/oxidecomputer/dice-util"
const-oid = { version = "0.9.5", features = ["db"] }
dice-verifier = { git = "https://github.com/oxidecomputer/dice-util", features = ["mock"] }
ed25519-dalek = { version = "2.1", default-features = false }
getrandom = { version = "0.3.4", features = ["std"] }
hex = "0.4.3"
hubpack = "0.1.2"
libc = "0.2.180"
log = "0.4.29"
rats-corim.git = "https://github.com/oxidecomputer/rats-corim"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
serde_with = { version = "3.16.1", features = ["hex"] }
sha2 = "0.10.9"
thiserror = "2.0.17"
uuid = { version = "1.18.1", features = ["std", "serde"] }
vsock = { version = "0.5.2", optional = true }
x509-cert = "0.2.5"

[build-dependencies]
anyhow.version = "1.0.100"

[dev-dependencies]
vm-attest = { path = ".", features = ["test-data"] }
